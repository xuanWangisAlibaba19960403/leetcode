<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /**
        * @param {string} leaves
        * @return {number}
        */
        var minimumOperations = function (leaves) {
            var len = leaves.length;
            // 初始状态不可能为 2, 3，设置为 Infinity
            var dp = [leaves[0] === 'r' ? 0 : 1, Infinity, Infinity];
            console.log(dp);
            for (var i = 1; i < len; i++) {
                var isRed = leaves[i] === 'r';
                console.log(isRed);
                dp = [
                    dp[0] + (isRed ? 0 : 1),
                    Math.min(dp[0], dp[1]) + (isRed ? 1 : 0),
                    Math.min(dp[1], dp[2]) + (isRed ? 0 : 1),
                ];
                console.log(dp);
            }

            return dp[2];
        };

        var leaves = "rrryyyrryyyrr";
        document.write(leaves);
        minimumOperations(leaves);
    </script>
</body>

</html>
