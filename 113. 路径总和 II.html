  <script>
    /**
    * Definition for a binary tree node.
    * function TreeNode(val) {
    *     this.val = val;
    *     this.left = this.right = null;
    * }
    */
    /**
     * @param {TreeNode} root
     * @param {number} sum
     * @return {number[][]}
     */
    var pathSum = function (root, sum) {
      const ret = [];
      if (root === null) {
        return ret;
      }
      dfs(sum, root, [], ret);
      console.log(ret);
      return ret;
    };

    var dfs = function (target, root, path, ret) {
      if (root === null) {
        return;
      }
      path.push(root.val);
      const tmpTarget = target - root.val;
      if (root.left === null &&
        root.right === null) {
        if (tmpTarget === 0) {
          ret.push([...path]);
        }
      } else {
        if (root.left) {
          dfs(tmpTarget, root.left, path, ret);
        }
        if (root.right) {
          dfs(tmpTarget, root.right, path, ret);
        }
      }

      path.pop();
    }
