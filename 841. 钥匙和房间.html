    var canVisitAllRooms = function (rooms) {
      // 新建visited数组，visited[i]表示i号房间能否去到，值为true表示去得到，为false表示去不到
      const visited = new Array(rooms.length).fill(false);
      // 从0号房间开始dfs
      dfs(0, visited, rooms);
      // 判断是不是所有房间都能进入
      return visited.every(v => v === true);
    }

    var dfs = function (n, visited, rooms) {
      // 如果房间已经去过，直接return
      if (visited[n]) {
        return;
      }
      console.log(n);
      visited[n] = true;
      // 对房间里的钥匙挨个进行dfs
      for (let key of rooms[n]) {
        console.log('key', key)
        dfs(key, visited, rooms);
      }
    }
    // console.log(canVisitAllRooms([[1], [2], [3], []]));
