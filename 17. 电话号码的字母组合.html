        var letterCombinations = function (digits) {
            const dict = new Map();
            dict.set('2', 'abc');
            dict.set('3', 'def');
            dict.set('4', 'ghi');
            dict.set('5', 'jkl');
            dict.set('6', 'mno');
            dict.set('7', 'pqrs');
            dict.set('8', 'tuv');
            dict.set('9', 'wxyz');
            const queue = [''];
            for (let digit of digits) {
                const len = queue.length;
                for (let i = 0; i < len; i++) {   // 逐个让当前层的节点出列
                    const curStr = queue.shift();         // 出列
                    const letters = dict.get(digit);
                    for (const letter of letters) {
                        queue.push(curStr + letter); // 生成新的字母串入列
                    }
                }
            }
            console.log(queue);
        };

        letterCombinations('23')
