  <script>
    /**
    * Definition for a binary tree node.
    * function TreeNode(val) {
    *     this.val = val;
    *     this.left = this.right = null;
    * }
    */
    /**
     * @param {TreeNode} root
     * @return {TreeNode}
     */
    var convertBST = function (root) {
      if (root === null) {
        return null;
      }
      dfs(root, 0);
      console.log(root)
      return root;
    };

    var dfs = function (root, sum) {
      if (root === null) {
        return;
      }
      if (root.right) {
        dfs(root.right, sum);
      }
      sum += root.val;
      console.log(sum);
      root.val = sum;

      if (root.left) {
        dfs(root.left, sum);
      }
    }

    convertBST(root);
  </script>
