        function comb(max, n, out = [], curr = [], start = 1) {
            if (curr.length === max) {
                out.push(curr);
                return [];
            }
            while (start <= n) {
                comb(max, n, out, [...curr, start], ++start);
            }
            return out;
        }


















        var combine = function (n, k) {
            return dfs(1, n, k, [], []);
        };

        var dfs = function (start, end, k, path, ret) {
            if (k === 0) {
                ret.push([...path]);
                return;
            }
            for (let i = start; i <= end; i++) {
                path.push(i);
                dfs(i + 1, end, k - 1, path, ret);
                path.pop();
            }
            return ret;
        }
