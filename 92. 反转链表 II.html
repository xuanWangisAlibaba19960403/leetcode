    function ListNode(val) {
      this.val = val;
      this.next = null;
    }
  </script>
  <script>
    const thead = new ListNode();
    let cur = thead;
    for (let i = 1; i <= 5; i++) {
      cur.next = new ListNode(i);
      cur = cur.next;
    }

    var reverseBetween = function (head, m, n) {
      let thead = new ListNode(0);
      thead.next = head;
      let tmp = thead;
      for (let i = 0; i < m - 1; i++) {
        tmp = tmp.next;
      }
      console.log(tmp);
      let start = tmp.next;
      let tail = start.next;
      console.log('start', start);
      console.log('tail', tail);
      for (let i = 0; i < n - m; i++) {
        start.next = tail.next;
        tail.next = tmp.next;
        tmp.next = tail;
        tail = start.next;
      }
      return thead.next;
    };

    reverseBetween(thead.next, 2, 4);
