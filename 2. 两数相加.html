<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function ListNode(val, next) {
            this.val = (val === undefined ? 0 : val)
            this.next = (next === undefined ? null : next)

        }

        var left = new ListNode(2);
        left.next = new ListNode(4);
        left.next.next = new ListNode(3);
        left.next.next.next = new ListNode(6);

        var right = new ListNode(5);
        right.next = new ListNode(6);
        right.next.next = new ListNode(4);

        console.log(left, right);
    </script>
    <script>
        /**
         * Definition for singly-linked list.
         * function ListNode(val, next) {
         *     this.val = (val===undefined ? 0 : val)
         *     this.next = (next===undefined ? null : next)
         * }
         */
        /**
         * @param {ListNode} l1
         * @param {ListNode} l2
         * @return {ListNode}
         */
        var addTwoNumbers = function (l1, l2) {
            const pre = new ListNode(0);
            let cur = pre;
            let carry = 0;
            while (l1 || l2) {
                let x = l1 === null ? 0 : l1.val;
                let y = l2 === null ? 0 : l2.val;
                let sum = x + y + carry;

                carry = Math.trunc(sum / 10);
                sum = sum % 10;
                cur.next = new ListNode(sum);

                cur = cur.next;
                if (l1) {
                    l1 = l1.next;
                }
                if (l2) {
                    l2 = l2.next;
                }
            }
            if (carry == 1) {
                cur.next = new ListNode(carry);
            }
            console.log(pre);
            return pre.next;
        };

        addTwoNumbers(left, right);
    </script>
</body>

</html>
