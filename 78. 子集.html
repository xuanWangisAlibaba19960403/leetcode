<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    /**
    * @param {number[]} nums
    * @return {number[][]}
    */
    var subsets = function (nums) {
      const len = nums.length;
      const ret = [];
      if (len === 0) return ret;
      dfs(0, len, [], nums, ret);
      return ret;
    };

    var dfs = function (n, max, path, nums, ret) {
      if (n === max) {
        ret.push([...path]);
        return;
      }
      path.push(nums[n]);
      dfs(n + 1, max, path, nums, ret);
      path.pop();
      dfs(n + 1, max, path, nums, ret);
    }
    // 输入: nums = [1, 2, 3]
    // 输出:
    // [
    //     [3],
    //     [1],
    //     [2],
    //     [1, 2, 3],
    //     [1, 3],
    //     [2, 3],
    //     [1, 2],
    //     []
    // ]

    var nums = [1, 2, 3];

    subsets(nums);
  </script>
</body>

</html>
