<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    /**
    * @param {string} num1
    * @param {string} num2
    * @return {string}
    */
    var multiply = function (num1, num2) {
      if (num1 === '0' || num2 === '0') return '0'

      const m = num1.length,
        n = num2.length,
        res = new Array(m + n).fill(0);
      for (let i = m - 1; i >= 0; i--) {
        for (let j = n - 1; j >= 0; j--) {
          const p1 = i + j, // 进位
            p2 = i + j + 1; // 当前位
          let sum = res[p2] + Number(num1[i]) * Number(num2[j])
          res[p2] = sum % 10
          res[p1] += Math.trunc(sum / 10)
        }
      }
      if (res[0] === 0) res.shift()
      return res.join('')

    }

    multiply("123", "456");
  </script>
</body>

</html>
