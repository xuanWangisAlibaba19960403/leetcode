    var combinationSum = function (candidates, target) {

      const ret = [];

        return ret;

      dfs(0, len, target, [], ret, candidates);
      console.log(ret);
    };

    var dfs = function (start, end, target, path, ret, store) {
      if (target === 0) {
        console.log(path);
        ret.push([...path]);
        return;
      }
      for (let i = start; i < end; i++) {
        if (target - store[i] < 0) { // 剪枝
          break;
        }
        path.push(store[i]);
        dfs(i, end, target - store[i], path, ret, store);
        path.pop();
      }
    }
