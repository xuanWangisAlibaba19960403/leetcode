<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    /**
    * @param {number} n
    * @return {string[][]}
    */
    function solveNQueens(n) {
      const board = new Array(n);
      for (let i = 0; i < n; i++) { // 创建一个充满“点”的棋盘
        board[i] = new Array(n).fill('.');
      }
      console.log(board);
      const ans = [];
      helper(0, n, ans, board);  // 搜索的开始按钮，从第0行开始
      console.log(ans);
      return ans;
    };

    function isValid(row, col, n, board) {
      for (let i = 0; i < row; i++) {
        for (let j = 0; j < n; j++) {
          if (board[i][j] == 'Q' &&
            j == col ||
            i + j === row + col ||
            i - j === row - col
          ) {
            return false;
          }
        }
      }
      return true;
    };

    function helper(row, n, ans, board) {
      if (row == n) { // 递归的出口
        const stringsBoard = board.slice(); // 拷贝一份board
        for (let i = 0; i < n; i++) {
          stringsBoard[i] = stringsBoard[i].join(''); // 将每一行拼成字符串
        }
        ans.push(stringsBoard); // 推入结果数组
        return;
      }
      for (let col = 0; col < n; col++) { // 枚举选择
        if (isValid(row, col, n, board)) { // 提前去掉无效的选择
          board[row][col] = "Q"; // 作出选择，放置皇后
          helper(row + 1, n, ans, board);       // 继续选择，往下递归
          board[row][col] = '.'; // 撤销当前选择
        }
      }
    };

    solveNQueens(4);
  </script>
</body>

</html>
