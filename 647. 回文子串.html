<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var str = 'abc';
        var n = 3;
        /**
        * @param {string} s
        * @return {number}
        */
        var countSubstrings = function (s) {
            const n = s.length;
            let ans = 0;
            for (let i = 0; i < 2 * n - 1 ; i++) {
                console.log('i', i)
                let l = i >> 1,
                    r = l + i % 2;
                while (l >= 0 && r < n && s[l] === s[r]) {
                    --l;
                    ++r;
                    ++ans;
                    console.log('l', l)
                    console.log('r', r)
                }
            }
            return ans;
        };

        console.log(countSubstrings('abc'));
    </script>
</body>
